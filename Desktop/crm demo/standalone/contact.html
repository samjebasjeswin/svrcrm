<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External Contact Form - Standalone Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: #1e293b;
            font-size: 24px;
            margin-bottom: 8px;
        }

        p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #4f46e5;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #4338ca;
        }

        .info-box {
            margin-top: 24px;
            padding: 12px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            font-size: 12px;
            color: #1e40af;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <h1>Contact Support</h1>
        <p>This is a standalone form hosted on a different server/folder.</p>

        <!-- THE ACTION URL IS YOUR CRM COMPANY-SPECIFIC API -->
        <form action="http://localhost:5173/api/1/contact" method="GET">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="4" placeholder="How can we help you?" required></textarea>
            </div>

            <button type="submit">Submit Inquiry</button>
        </form>

        <div class="info-box">
            <strong>Note:</strong> This form uses the <code>GET</code> method to submit data to the CRM's
            company-specific API endpoint.
            In a production environment, you would use <code>POST</code> via fetch/AJAX.
        </div>
    </div>
</body>

</html>
