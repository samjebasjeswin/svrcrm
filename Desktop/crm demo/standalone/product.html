<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External Product Inquiry - Standalone Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce7f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: #831843;
            font-size: 24px;
            margin-bottom: 8px;
        }

        p {
            color: #9d174d;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #9d174d;
            margin-bottom: 6px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #fbcfe8;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #ec4899;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #ec4899;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #db2777;
        }

        .info-box {
            margin-top: 24px;
            padding: 12px;
            background: #fff1f2;
            border: 1px solid #fecdd3;
            border-radius: 6px;
            font-size: 12px;
            color: #9f1239;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <h1>Product Inquiry</h1>
        <p>Inquire about our premium products directly from any external source.</p>

        <!-- THE ACTION URL IS YOUR CRM COMPANY-SPECIFIC API -->
        <form action="http://localhost:5173/api/1/product" method="GET">

            <div class="form-group">
                <label>Interested Product</label>
                <input type="text" name="product" placeholder="e.g. Industrial Valve XZ-100" required>
            </div>

            <div class="form-group">
                <label>Quantity</label>
                <input type="number" name="quantity" value="1" min="1" required>
            </div>

            <div class="form-group">
                <label>Contact Email</label>
                <input type="email" name="contact_email" placeholder="john@example.com" required>
            </div>

            <button type="submit">Inquire Now</button>
        </form>

        <div class="info-box">
            <strong>API Endpoint Used:</strong> <code>/api/{companyId}/product</code>
        </div>
    </div>
</body>

</html>
